<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AMSAN BTP - Avances</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    .dark .card-hover{background:#1e293b}
    .card-hover:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,0,0,0.08)}
    .dark .card-hover:hover{box-shadow:0 12px 30px rgba(0,0,0,0.3)}
    .sidebar-link{transition:all .2s ease}
    .dark .sidebar-link:hover{background:rgba(59,130,246,0.1);color:#93c5fd}
    input,select,textarea{-webkit-appearance:none}
  </style>
  
  <script>if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark');</script>
</head>
<body class="bg-gray-50 dark:bg-slate-900 transition-colors duration-200">

<div id="overlay" class="md:hidden fixed inset-0 bg-black/50 z-[9] hidden" onclick="closeSidebar()"></div>
<script>
function closeSidebar(){{document.getElementById('sidebar').classList.add('-translate-x-full');document.getElementById('overlay').classList.add('hidden');}}
document.getElementById('menuBtn')?.addEventListener('click',()=>{{document.getElementById('sidebar').classList.toggle('-translate-x-full');document.getElementById('overlay').classList.toggle('hidden');}});
function toggleDarkMode(){{const h=document.documentElement;h.classList.toggle('dark');localStorage.setItem('darkMode',h.classList.contains('dark'));}}
</script>
<div class="flex h-screen">
  
  <aside id="sidebar" class="bg-white dark:bg-slate-800 w-64 fixed h-full shadow-lg z-10 -translate-x-full md:translate-x-0 transition-all duration-300 border-r border-gray-200 dark:border-slate-700">
    <div class="p-5 border-b border-gray-200 dark:border-slate-700">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-blue-800 rounded-xl flex items-center justify-center text-white font-bold text-lg">A</div>
        <div><h1 class="text-lg font-bold text-gray-800 dark:text-white">AMSAN BTP</h1><p class="text-xs text-gray-500 dark:text-gray-400">Gestion de chantier</p></div>
      </div>
    </div>
    <nav class="p-3 space-y-1"><a href="index.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-chart-pie w-5 text-center"></i> Tableau de bord</a>
<a href="ouvriers.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-users w-5 text-center"></i> Ouvriers</a>
<a href="chantiers.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-hard-hat w-5 text-center"></i> Chantiers</a>
<a href="pointage.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-clipboard-check w-5 text-center"></i> Pointage</a>
<a href="depenses.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-coins w-5 text-center"></i> Dépenses</a>
<a href="avances.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 font-medium"><i class="fas fa-hand-holding-usd w-5 text-center"></i> Avances</a>
<a href="fiche-paie.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-file-invoice w-5 text-center"></i> Fiche de paie</a>
</nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-200 dark:border-slate-700">
      <button onclick="toggleDarkMode()" class="sidebar-link flex items-center gap-3 w-full px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50">
        <i class="fas fa-moon w-5 text-center dark:hidden"></i><i class="fas fa-sun w-5 text-center hidden dark:inline"></i>
        <span class="dark:hidden">Mode sombre</span><span class="hidden dark:inline">Mode clair</span>
      </button>
    </div>
  </aside>
  <div class="flex-1 md:ml-64 flex flex-col min-h-screen">
    
  <header class="bg-white dark:bg-slate-800 shadow-sm border-b border-gray-200 dark:border-slate-700 p-4 flex items-center gap-3 sticky top-0 z-10">
    <button id="menuBtn" class="md:hidden text-gray-600 dark:text-gray-300 text-xl"><i class="fas fa-bars"></i></button>
    <h2 class="text-lg font-semibold text-gray-800 dark:text-white">Avances</h2>
  </header>
    <main class="flex-1 p-4 md:p-6 pb-24 md:pb-6 max-w-7xl mx-auto w-full overflow-y-auto">
      
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm p-4 mb-4">
  <h3 class="font-semibold text-gray-800 dark:text-white mb-3 text-sm flex items-center gap-2"><i class="fas fa-plus-circle text-amber-500"></i> Enregistrer une avance</h3>
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
    <select id="fOuvrier" class="px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none"><option value="">Ouvrier *</option></select>
    <input type="date" id="fDate" class="px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
    <input type="number" step="0.01" id="fMontant" placeholder="Montant (MAD) *" class="px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
    <input type="text" id="fNote" placeholder="Note (optionnel)" class="px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
  </div>
  <div id="formError" class="mt-2 text-red-500 text-sm hidden"></div>
  <button onclick="addAvance()" class="mt-3 w-full bg-gradient-to-r from-amber-500 to-amber-600 text-white py-3 rounded-xl shadow-md flex items-center justify-center gap-2"><i class="fas fa-plus"></i> Ajouter l'avance</button>
</div>

<div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm p-4">
  <select id="filterOuvrier" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none mb-4"><option value="">Tous les ouvriers</option></select>

  <!-- MOBILE CARDS -->
  <div id="avanceCards" class="md:hidden space-y-3"></div>

  <!-- DESKTOP TABLE -->
  <div class="hidden md:block overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 dark:bg-slate-700/50 text-gray-600 dark:text-gray-300">
        <tr><th class="text-left p-4 font-medium">Date</th><th class="text-left p-4 font-medium">Ouvrier</th><th class="text-left p-4 font-medium">Montant</th><th class="text-left p-4 font-medium">Note</th><th class="p-4"></th></tr>
      </thead>
      <tbody id="avancesTable"></tbody>
    </table>
  </div>
  <div class="flex justify-between items-center mt-4 pt-3 border-t border-gray-100 dark:border-slate-700">
    <span class="text-sm text-gray-500 dark:text-gray-400" id="avanceCount">0 avance(s)</span>
    <span class="font-bold text-gray-800 dark:text-white">Total : <span id="totalAvances">0.00</span> MAD</span>
  </div>
</div>
    </main>
  </div>
</div>

<!-- MORE DRAWER -->
<div id="moreDrawer" class="md:hidden fixed bottom-16 left-0 right-0 bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 z-30 hidden shadow-2xl rounded-t-2xl">
  <div class="p-2 flex justify-around">
    <a href="chantiers.html" class="flex flex-col items-center gap-1 p-4 rounded-xl text-sm text-gray-600 dark:text-gray-300"><i class="fas fa-hard-hat text-2xl text-orange-500"></i><span>Chantiers</span></a>
    <a href="avances.html" class="flex flex-col items-center gap-1 p-4 rounded-xl text-sm text-blue-600 font-medium"><i class="fas fa-hand-holding-usd text-2xl text-blue-500"></i><span>Avances</span></a>
    <a href="fiche-paie.html" class="flex flex-col items-center gap-1 p-4 rounded-xl text-sm text-gray-600 dark:text-gray-300"><i class="fas fa-file-invoice text-2xl text-violet-500"></i><span>Fiche de paie</span></a>
    <button onclick="toggleDarkMode()" class="flex flex-col items-center gap-1 p-4 rounded-xl text-sm text-gray-600 dark:text-gray-300"><i class="fas fa-moon text-2xl text-slate-500 dark:hidden"></i><i class="fas fa-sun text-2xl text-yellow-400 hidden dark:inline"></i><span class="dark:hidden">Sombre</span><span class="hidden dark:inline">Clair</span></button>
  </div>
</div>
<!-- BOTTOM NAV -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 z-20 flex justify-around items-center h-16 px-1">
<a href="index.html" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400"><i class="fas fa-chart-pie text-xl"></i><span>Accueil</span></a>
<a href="ouvriers.html" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400"><i class="fas fa-users text-xl"></i><span>Ouvriers</span></a>
<a href="pointage.html" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400"><i class="fas fa-clipboard-check text-xl"></i><span>Pointage</span></a>
<a href="depenses.html" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400"><i class="fas fa-coins text-xl"></i><span>Dépenses</span></a>
<button onclick="toggleMore()" class="flex flex-col items-center gap-0.5 text-xs text-blue-600 dark:text-blue-400" id="moreBtn"><i class="fas fa-ellipsis-h text-xl"></i><span>Plus</span></button>

</nav>
<script>
function toggleMore(){
  const d=document.getElementById('moreDrawer');
  d.classList.toggle('hidden');
  document.getElementById('moreBtn').querySelector('i').className = d.classList.contains('hidden') ? 'fas fa-ellipsis-h text-xl' : 'fas fa-times text-xl';
}
document.addEventListener('click',function(e){
  const d=document.getElementById('moreDrawer');
  const btn=document.getElementById('moreBtn');
  if(!d.classList.contains('hidden')&&!d.contains(e.target)&&!btn.contains(e.target)){
    d.classList.add('hidden');
    btn.querySelector('i').className='fas fa-ellipsis-h text-xl';
  }
});
</script>
<script>

document.getElementById('fDate').value=new Date().toISOString().split('T')[0];
let ouvriers=[],avances=[];
async function loadOuvriers(){
  const r=await fetch('/api/ouvriers');ouvriers=await r.json();
  ['fOuvrier','filterOuvrier'].forEach(id=>{
    const sel=document.getElementById(id);
    sel.innerHTML='<option value="">'+(id==='filterOuvrier'?'Tous les ouvriers':'Ouvrier *')+'</option>'+ouvriers.map(o=>`<option value="${o.id}">${o.nom}</option>`).join('');
  });
}
async function loadAvances(){
  const id=document.getElementById('filterOuvrier').value;
  const r=await fetch('/api/avances?'+(id?`ouvrier_id=${id}`:''));avances=await r.json();render();
}
function render(){
  let total=0;
  document.getElementById('avanceCards').innerHTML=avances.map(a=>{total+=parseFloat(a.montant||0);return `
    <div class="flex items-center gap-3 bg-amber-50 dark:bg-amber-900/10 rounded-xl p-3">
      <div class="flex-1 min-w-0">
        <div class="font-semibold text-gray-800 dark:text-gray-200">${a.ouvrier_nom}</div>
        <div class="text-xs text-gray-500 dark:text-gray-400">${a.date}${a.note?' · '+a.note:''}</div>
      </div>
      <div class="text-right shrink-0">
        <div class="font-bold text-amber-600 dark:text-amber-400">${parseFloat(a.montant||0).toFixed(2)} MAD</div>
        <button onclick="deleteAvance(${a.id})" class="text-red-400 hover:text-red-600 text-xs mt-1"><i class="fas fa-trash"></i></button>
      </div>
    </div>`;}).join('');
  document.getElementById('avancesTable').innerHTML=avances.map(a=>`
    <tr class="border-b border-gray-100 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-700/30">
      <td class="p-4 text-gray-700 dark:text-gray-300">${a.date}</td>
      <td class="p-4 text-gray-700 dark:text-gray-300">${a.ouvrier_nom}</td>
      <td class="p-4 font-medium text-amber-600 dark:text-amber-400">${parseFloat(a.montant||0).toFixed(2)} MAD</td>
      <td class="p-4 text-gray-600 dark:text-gray-400">${a.note||'-'}</td>
      <td class="p-4"><button onclick="deleteAvance(${a.id})" class="text-red-500 hover:text-red-700 dark:text-red-400"><i class="fas fa-trash"></i></button></td>
    </tr>`).join('');
  document.getElementById('totalAvances').textContent=total.toFixed(2);
  document.getElementById('avanceCount').textContent=avances.length+' avance(s)';
}
async function addAvance(){
  document.getElementById('formError').classList.add('hidden');
  const data={ouvrier_id:parseInt(document.getElementById('fOuvrier').value),date:document.getElementById('fDate').value,montant:parseFloat(document.getElementById('fMontant').value),note:document.getElementById('fNote').value.trim()};
  if(!data.ouvrier_id||!data.date||!data.montant){const e=document.getElementById('formError');e.textContent='Champs obligatoires manquants';e.classList.remove('hidden');return;}
  const r=await fetch('/api/avances',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(!r.ok){const e2=await r.json();const e=document.getElementById('formError');e.textContent=e2.error||'Erreur';e.classList.remove('hidden');return;}
  document.getElementById('fMontant').value='';document.getElementById('fNote').value='';loadAvances();
}
async function deleteAvance(id){if(!confirm('Supprimer ?'))return;await fetch(`/api/avances/${id}`,{method:'DELETE'});loadAvances();}
document.getElementById('filterOuvrier').addEventListener('change',loadAvances);
loadOuvriers();loadAvances();

</script>
</body>
</html>
