<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMSAN BTP - Ouvriers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>.dark .sidebar-link:hover { background: rgba(59,130,246,0.1); color: #93c5fd; }</style>
  <script>if (localStorage.getItem('darkMode') === 'true') document.documentElement.classList.add('dark');</script>
</head>
<body class="bg-gray-50 dark:bg-slate-900 transition-colors duration-200">
  <div class="flex h-screen">
    <aside id="sidebar" class="bg-white dark:bg-slate-800 w-64 fixed h-full shadow-lg z-10 -translate-x-full md:translate-x-0 transition-all duration-300 border-r border-gray-200 dark:border-slate-700">
      <div class="p-5 border-b border-gray-200 dark:border-slate-700">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-blue-800 rounded-xl flex items-center justify-center text-white font-bold text-lg">A</div>
          <div><h1 class="text-lg font-bold text-gray-800 dark:text-white">AMSAN BTP</h1><p class="text-xs text-gray-500 dark:text-gray-400">Gestion de chantier</p></div>
        </div>
      </div>
      <nav class="p-3 space-y-1">
        <a href="index.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-chart-pie w-5 text-center"></i> Tableau de bord</a>
        <a href="ouvriers.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 font-medium"><i class="fas fa-users w-5 text-center"></i> Ouvriers</a>
        <a href="chantiers.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-hard-hat w-5 text-center"></i> Chantiers</a>
        <a href="pointage.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-clipboard-check w-5 text-center"></i> Pointage</a>
        <a href="depenses.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-coins w-5 text-center"></i> Dépenses</a>
        <a href="avances.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-hand-holding-usd w-5 text-center"></i> Avances</a>
        <a href="fiche-paie.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-file-invoice w-5 text-center"></i> Fiche de paie</a>
      </nav>
      <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-200 dark:border-slate-700">
        <button onclick="toggleDarkMode()" class="sidebar-link flex items-center gap-3 w-full px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50">
          <i class="fas fa-moon w-5 text-center dark:hidden"></i>
          <i class="fas fa-sun w-5 text-center hidden dark:inline"></i>
          <span class="dark:hidden">Mode sombre</span>
          <span class="hidden dark:inline">Mode clair</span>
        </button>
      </div>
    </aside>
    <div class="flex-1 md:ml-64 flex flex-col">
      <header class="bg-white dark:bg-slate-800 shadow-sm border-b border-gray-200 dark:border-slate-700 p-4 flex items-center gap-3 sticky top-0 z-10">
        <button id="menuBtn" class="md:hidden text-gray-600 dark:text-gray-300 text-xl"><i class="fas fa-bars"></i></button>
        <h2 class="text-lg font-semibold text-gray-800 dark:text-white">Ouvriers</h2>
      </header>
      <main class="p-4 md:p-6 max-w-7xl mx-auto w-full overflow-y-auto">
        <div class="flex flex-col sm:flex-row gap-3 mb-6">
          <div class="relative flex-1">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="searchInput" placeholder="Rechercher un ouvrier..." class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none transition-colors">
          </div>
          <button onclick="openModal()" class="bg-gradient-to-r from-blue-600 to-blue-700 text-white px-6 py-3 rounded-xl hover:from-blue-700 hover:to-blue-800 shadow-md hover:shadow-lg transition-all h-12 flex items-center gap-2"><i class="fas fa-plus"></i> Nouvel ouvrier</button>
        </div>
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm overflow-hidden transition-all">
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-gray-50 dark:bg-slate-700/50 text-gray-600 dark:text-gray-300">
                <tr><th class="text-left p-4 font-medium">Prénom</th><th class="text-left p-4 font-medium">Nom</th><th class="text-left p-4 font-medium">CIN</th><th class="text-left p-4 font-medium">Téléphone</th><th class="text-left p-4 font-medium">Poste</th><th class="text-left p-4 font-medium">Salaire/j</th><th class="text-left p-4 font-medium">Tarif HS</th><th class="text-left p-4 font-medium">Statut</th><th class="text-left p-4 font-medium">Actions</th></tr>
              </thead>
              <tbody id="ouvriersTable"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="ouvrierModal" class="fixed inset-0 bg-black/50 dark:bg-black/70 z-20 hidden items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md p-6">
      <h3 class="text-lg font-semibold text-gray-800 dark:text-white mb-4" id="modalTitle">Ajouter un ouvrier</h3>
      <input type="hidden" id="editId">
      <div class="grid grid-cols-2 gap-3">
        <input type="text" id="fPrenom" placeholder="Prénom" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
        <input type="text" id="fNom" placeholder="Nom *" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
        <input type="text" id="fCin" placeholder="C.I.N." class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
        <input type="text" id="fTelephone" placeholder="Téléphone" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
        <input type="text" id="fPoste" placeholder="Poste" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
        <input type="number" step="0.01" id="fSalaire" placeholder="Salaire journalier *" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
        <input type="number" step="0.01" id="fTarifHS" placeholder="Tarif heures sup *" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none" style="grid-column: span 2;">
      </div>
      <div class="flex gap-3 mt-6">
        <button onclick="closeModal()" class="flex-1 px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700 transition-colors">Annuler</button>
        <button onclick="saveOuvrier()" class="flex-1 px-4 py-3 rounded-xl bg-gradient-to-r from-blue-600 to-blue-700 text-white hover:from-blue-700 hover:to-blue-800 shadow-md transition-all">Enregistrer</button>
      </div>
      <div id="modalError" class="mt-3 text-red-500 text-sm hidden"></div>
    </div>
  </div>

  <script>
    function toggleDarkMode() { const h=document.documentElement; h.classList.toggle('dark'); localStorage.setItem('darkMode', h.classList.contains('dark')); }
    document.getElementById('menuBtn')?.addEventListener('click', () => { document.getElementById('sidebar').classList.toggle('-translate-x-full'); });
    let ouvriers = [];
    async function loadOuvriers() { const r=await fetch('/api/ouvriers'); ouvriers=await r.json(); renderTable(); }
    function renderTable() {
      const q=document.getElementById('searchInput').value.toLowerCase();
      document.getElementById('ouvriersTable').innerHTML = ouvriers.filter(o=>(o.nom+' '+(o.prenom||'')).toLowerCase().includes(q)).map(o=>`
        <tr class="border-b border-gray-100 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-700/30 transition-colors">
          <td class="p-4 text-gray-700 dark:text-gray-300">${o.prenom||'-'}</td>
          <td class="p-4 font-medium text-gray-800 dark:text-gray-200">${o.nom}</td>
          <td class="p-4 text-gray-600 dark:text-gray-400 font-mono text-xs">${o.cin||'-'}</td>
          <td class="p-4 text-gray-600 dark:text-gray-400">${o.telephone||'-'}</td>
          <td class="p-4 text-gray-600 dark:text-gray-400">${o.poste||'-'}</td>
          <td class="p-4 text-gray-800 dark:text-gray-200">${o.salaire_journalier.toFixed(2)} MAD</td>
          <td class="p-4 text-gray-800 dark:text-gray-200">${o.tarif_hs.toFixed(2)} MAD</td>
          <td class="p-4"><span class="px-3 py-1 rounded-full text-xs font-medium ${o.actif ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-400' : 'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-400'}">${o.actif ? 'Actif' : 'Inactif'}</span></td>
          <td class="p-4"><button onclick="editOuvrier(${o.id})" class="text-blue-500 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 mr-2"><i class="fas fa-edit"></i></button><button onclick="toggleActif(${o.id})" class="text-amber-500 hover:text-amber-700 dark:text-amber-400 dark:hover:text-amber-300 mr-2"><i class="fas ${o.actif ? 'fa-eye-slash' : 'fa-eye'}"></i></button><button onclick="deleteOuvrier(${o.id})" class="text-red-500 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300"><i class="fas fa-trash"></i></button></td>
        </tr>
      `).join('');
    }
    document.getElementById('searchInput').addEventListener('input', renderTable);
    function openModal(o) {
      document.getElementById('modalError').classList.add('hidden');
      document.getElementById('modalTitle').textContent = o ? 'Modifier un ouvrier' : 'Ajouter un ouvrier';
      document.getElementById('editId').value = o ? o.id : '';
      document.getElementById('fPrenom').value = o ? (o.prenom||'') : '';
      document.getElementById('fNom').value = o ? o.nom : '';
      document.getElementById('fCin').value = o ? (o.cin||'') : '';
      document.getElementById('fTelephone').value = o ? (o.telephone||'') : '';
      document.getElementById('fPoste').value = o ? (o.poste||'') : '';
      document.getElementById('fSalaire').value = o ? o.salaire_journalier : '';
      document.getElementById('fTarifHS').value = o ? o.tarif_hs : '';
      document.getElementById('ouvrierModal').classList.remove('hidden');
      document.getElementById('ouvrierModal').classList.add('flex');
    }
    function closeModal() { document.getElementById('ouvrierModal').classList.add('hidden'); document.getElementById('ouvrierModal').classList.remove('flex'); }
    function editOuvrier(id) { const o=ouvriers.find(x=>x.id===id); if(o) openModal(o); }
    async function saveOuvrier() {
      const id=document.getElementById('editId').value;
      const data={ nom: document.getElementById('fNom').value.trim(), prenom: document.getElementById('fPrenom').value.trim(), cin: document.getElementById('fCin').value.trim(), telephone: document.getElementById('fTelephone').value.trim(), poste: document.getElementById('fPoste').value.trim(), salaire_journalier: parseFloat(document.getElementById('fSalaire').value), tarif_hs: parseFloat(document.getElementById('fTarifHS').value) };
      if (!data.nom || !data.salaire_journalier || !data.tarif_hs) { showError('Veuillez remplir tous les champs obligatoires'); return; }
      const url = id ? `/api/ouvriers/${id}` : '/api/ouvriers';
      const res = await fetch(url, { method: id ? 'PUT' : 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
      if (!res.ok) { const err=await res.json(); showError(err.error||'Erreur'); return; }
      closeModal(); loadOuvriers();
    }
    function showError(msg) { const el=document.getElementById('modalError'); el.textContent=msg; el.classList.remove('hidden'); }
    async function toggleActif(id) {
      const o=ouvriers.find(x=>x.id===id); if(!o) return;
      if (!confirm(`Voulez-vous ${o.actif ? 'désactiver' : 'activer'} cet ouvrier ?`)) return;
      await fetch(`/api/ouvriers/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({actif: o.actif?0:1}) });
      loadOuvriers();
    }
    async function deleteOuvrier(id) {
      if (!confirm('Supprimer définitivement cet ouvrier ?')) return;
      const res=await fetch(`/api/ouvriers/${id}`, {method:'DELETE'});
      if (!res.ok) { const err=await res.json(); alert(err.error||'Erreur'); return; }
      loadOuvriers();
    }
    loadOuvriers();
  </script>
</body>
</html>
