<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AMSAN BTP - Chantiers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    .dark .card-hover{background:#1e293b}
    .card-hover:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,0,0,0.08)}
    .dark .card-hover:hover{box-shadow:0 12px 30px rgba(0,0,0,0.3)}
    .sidebar-link{transition:all .2s ease}
    .dark .sidebar-link:hover{background:rgba(59,130,246,0.1);color:#93c5fd}
    input,select,textarea{-webkit-appearance:none}
  </style>
  
  <script>if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark');</script>
</head>
<body class="bg-gray-50 dark:bg-slate-900 transition-colors duration-200">

<div id="overlay" class="md:hidden fixed inset-0 bg-black/50 z-[9] hidden" onclick="closeSidebar()"></div>
<script>
function closeSidebar(){{document.getElementById('sidebar').classList.add('-translate-x-full');document.getElementById('overlay').classList.add('hidden');}}
document.getElementById('menuBtn')?.addEventListener('click',()=>{{document.getElementById('sidebar').classList.toggle('-translate-x-full');document.getElementById('overlay').classList.toggle('hidden');}});
function toggleDarkMode(){{const h=document.documentElement;h.classList.toggle('dark');localStorage.setItem('darkMode',h.classList.contains('dark'));}}
</script>
<div class="flex h-screen">
  
  <aside id="sidebar" class="bg-white dark:bg-slate-800 w-64 fixed h-full shadow-lg z-10 -translate-x-full md:translate-x-0 transition-all duration-300 border-r border-gray-200 dark:border-slate-700">
    <div class="p-5 border-b border-gray-200 dark:border-slate-700">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-blue-800 rounded-xl flex items-center justify-center text-white font-bold text-lg">A</div>
        <div><h1 class="text-lg font-bold text-gray-800 dark:text-white">AMSAN BTP</h1><p class="text-xs text-gray-500 dark:text-gray-400">Gestion de chantier</p></div>
      </div>
    </div>
    <nav class="p-3 space-y-1"><a href="index.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-chart-pie w-5 text-center"></i> Tableau de bord</a>
<a href="ouvriers.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-users w-5 text-center"></i> Ouvriers</a>
<a href="chantiers.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 font-medium"><i class="fas fa-hard-hat w-5 text-center"></i> Chantiers</a>
<a href="pointage.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-clipboard-check w-5 text-center"></i> Pointage</a>
<a href="depenses.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-coins w-5 text-center"></i> Dépenses</a>
<a href="avances.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-hand-holding-usd w-5 text-center"></i> Avances</a>
<a href="fiche-paie.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-file-invoice w-5 text-center"></i> Fiche de paie</a>
</nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-200 dark:border-slate-700">
      <button onclick="toggleDarkMode()" class="sidebar-link flex items-center gap-3 w-full px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50">
        <i class="fas fa-moon w-5 text-center dark:hidden"></i><i class="fas fa-sun w-5 text-center hidden dark:inline"></i>
        <span class="dark:hidden">Mode sombre</span><span class="hidden dark:inline">Mode clair</span>
      </button>
    </div>
  </aside>
  <div class="flex-1 md:ml-64 flex flex-col min-h-screen">
    
  <header class="bg-white dark:bg-slate-800 shadow-sm border-b border-gray-200 dark:border-slate-700 p-4 flex items-center gap-3 sticky top-0 z-10">
    <button id="menuBtn" class="md:hidden text-gray-600 dark:text-gray-300 text-xl"><i class="fas fa-bars"></i></button>
    <h2 class="text-lg font-semibold text-gray-800 dark:text-white">Chantiers</h2>
  </header>
    <main class="flex-1 p-4 md:p-6 pb-24 md:pb-6 max-w-7xl mx-auto w-full overflow-y-auto">
      
<div class="mb-4">
  <button onclick="openModal()" class="bg-gradient-to-r from-blue-600 to-blue-700 text-white px-5 py-3 rounded-xl shadow-md flex items-center gap-2"><i class="fas fa-plus"></i> Nouveau chantier</button>
</div>

<!-- MOBILE CARDS -->
<div id="chantierCards" class="md:hidden space-y-3"></div>

<!-- DESKTOP TABLE -->
<div class="hidden md:block bg-white dark:bg-slate-800 rounded-2xl shadow-sm overflow-hidden">
  <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 dark:bg-slate-700/50 text-gray-600 dark:text-gray-300">
        <tr><th class="text-left p-4 font-medium">Nom</th><th class="text-left p-4 font-medium">Ville</th><th class="text-left p-4 font-medium">Responsable</th><th class="text-left p-4 font-medium">Date début</th><th class="text-left p-4 font-medium">Statut</th><th class="text-left p-4 font-medium">Actions</th></tr>
      </thead>
      <tbody id="chantiersTable"></tbody>
    </table>
  </div>
</div>

<div id="chantierModal" class="fixed inset-0 bg-black/50 z-50 hidden items-end md:items-center justify-center backdrop-blur-sm">
  <div class="bg-white dark:bg-slate-800 rounded-t-3xl md:rounded-2xl shadow-2xl w-full md:max-w-md p-6 max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg font-semibold text-gray-800 dark:text-white" id="modalTitle">Ajouter un chantier</h3>
      <button onclick="closeModal()" class="w-8 h-8 rounded-full bg-gray-100 dark:bg-slate-700 flex items-center justify-center text-gray-500"><i class="fas fa-times"></i></button>
    </div>
    <input type="hidden" id="editId">
    <div class="space-y-3">
      <input type="text" id="fNom" placeholder="Nom *" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
      <input type="text" id="fVille" placeholder="Ville" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
      <input type="text" id="fResponsable" placeholder="Responsable" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
      <input type="date" id="fDateDebut" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
      <select id="fStatut" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
        <option value="actif">Actif</option><option value="termine">Terminé</option><option value="archive">Archivé</option>
      </select>
    </div>
    <div id="modalError" class="mt-3 text-red-500 text-sm hidden"></div>
    <div class="flex gap-3 mt-4">
      <button onclick="closeModal()" class="flex-1 px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 text-gray-700 dark:text-gray-300">Annuler</button>
      <button onclick="saveChantier()" class="flex-1 px-4 py-3 rounded-xl bg-gradient-to-r from-blue-600 to-blue-700 text-white shadow-md">Enregistrer</button>
    </div>
  </div>
</div>
    </main>
  </div>
</div>

<!-- MORE DRAWER -->
<div id="moreDrawer" class="md:hidden fixed bottom-16 left-0 right-0 bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 z-30 hidden shadow-2xl rounded-t-2xl">
  <div class="p-2 flex justify-around">
    <a href="chantiers.html" class="flex flex-col items-center gap-1 p-4 rounded-xl text-sm text-blue-600 font-medium"><i class="fas fa-hard-hat text-2xl text-blue-500"></i><span>Chantiers</span></a>
    <a href="avances.html" class="flex flex-col items-center gap-1 p-4 rounded-xl text-sm text-gray-600 dark:text-gray-300"><i class="fas fa-hand-holding-usd text-2xl text-amber-500"></i><span>Avances</span></a>
    <a href="fiche-paie.html" class="flex flex-col items-center gap-1 p-4 rounded-xl text-sm text-gray-600 dark:text-gray-300"><i class="fas fa-file-invoice text-2xl text-violet-500"></i><span>Fiche de paie</span></a>
    <button onclick="toggleDarkMode()" class="flex flex-col items-center gap-1 p-4 rounded-xl text-sm text-gray-600 dark:text-gray-300"><i class="fas fa-moon text-2xl text-slate-500 dark:hidden"></i><i class="fas fa-sun text-2xl text-yellow-400 hidden dark:inline"></i><span class="dark:hidden">Sombre</span><span class="hidden dark:inline">Clair</span></button>
  </div>
</div>
<!-- BOTTOM NAV -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 z-20 flex justify-around items-center h-16 px-1">
<a href="index.html" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400"><i class="fas fa-chart-pie text-xl"></i><span>Accueil</span></a>
<a href="ouvriers.html" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400"><i class="fas fa-users text-xl"></i><span>Ouvriers</span></a>
<a href="pointage.html" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400"><i class="fas fa-clipboard-check text-xl"></i><span>Pointage</span></a>
<a href="depenses.html" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400"><i class="fas fa-coins text-xl"></i><span>Dépenses</span></a>
<button onclick="toggleMore()" class="flex flex-col items-center gap-0.5 text-xs text-blue-600 dark:text-blue-400" id="moreBtn"><i class="fas fa-ellipsis-h text-xl"></i><span>Plus</span></button>

</nav>
<script>
function toggleMore(){
  const d=document.getElementById('moreDrawer');
  d.classList.toggle('hidden');
  document.getElementById('moreBtn').querySelector('i').className = d.classList.contains('hidden') ? 'fas fa-ellipsis-h text-xl' : 'fas fa-times text-xl';
}
document.addEventListener('click',function(e){
  const d=document.getElementById('moreDrawer');
  const btn=document.getElementById('moreBtn');
  if(!d.classList.contains('hidden')&&!d.contains(e.target)&&!btn.contains(e.target)){
    d.classList.add('hidden');
    btn.querySelector('i').className='fas fa-ellipsis-h text-xl';
  }
});
</script>
<script>

let chantiers=[];
const badgeCl=(s)=>s==='actif'?'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-400':s==='termine'?'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-400':'bg-gray-100 text-gray-600 dark:bg-slate-700 dark:text-gray-300';
async function loadChantiers(){const r=await fetch('/api/chantiers');chantiers=await r.json();render();}
function render(){
  document.getElementById('chantierCards').innerHTML=chantiers.map(c=>`
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm p-4">
      <div class="flex items-start justify-between mb-2">
        <div>
          <div class="font-semibold text-gray-800 dark:text-white">${c.nom}</div>
          <div class="text-xs text-gray-500 dark:text-gray-400">${c.ville||''} ${c.responsable?'· '+c.responsable:''}</div>
        </div>
        <span class="px-2.5 py-1 rounded-full text-xs font-medium shrink-0 ${badgeCl(c.statut)}">${c.statut}</span>
      </div>
      ${c.date_debut?`<div class="text-sm text-gray-500 dark:text-gray-400 mb-3"><i class="fas fa-calendar text-xs mr-1"></i>${c.date_debut}</div>`:''}
      <div class="flex gap-2">
        <button onclick="editChantier(${c.id})" class="flex-1 py-2 rounded-xl bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 text-sm font-medium"><i class="fas fa-edit mr-1"></i>Modifier</button>
        <button onclick="deleteChantier(${c.id})" class="px-4 py-2 rounded-xl bg-red-50 dark:bg-red-900/30 text-red-500 dark:text-red-400 text-sm"><i class="fas fa-trash"></i></button>
      </div>
    </div>`).join('');
  document.getElementById('chantiersTable').innerHTML=chantiers.map(c=>`
    <tr class="border-b border-gray-100 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-700/30">
      <td class="p-4 font-medium text-gray-800 dark:text-gray-200">${c.nom}</td>
      <td class="p-4 text-gray-600 dark:text-gray-400">${c.ville||'-'}</td>
      <td class="p-4 text-gray-600 dark:text-gray-400">${c.responsable||'-'}</td>
      <td class="p-4 text-gray-600 dark:text-gray-400">${c.date_debut||'-'}</td>
      <td class="p-4"><span class="px-3 py-1 rounded-full text-xs font-medium ${badgeCl(c.statut)}">${c.statut}</span></td>
      <td class="p-4 flex gap-2">
        <button onclick="editChantier(${c.id})" class="text-blue-500 hover:text-blue-700 dark:text-blue-400"><i class="fas fa-edit"></i></button>
        <button onclick="deleteChantier(${c.id})" class="text-red-500 hover:text-red-700 dark:text-red-400"><i class="fas fa-trash"></i></button>
      </td>
    </tr>`).join('');
}
function openModal(c){
  document.getElementById('modalError').classList.add('hidden');
  document.getElementById('modalTitle').textContent=c?'Modifier':'Ajouter un chantier';
  document.getElementById('editId').value=c?c.id:'';
  document.getElementById('fNom').value=c?c.nom:'';
  document.getElementById('fVille').value=c?(c.ville||''):'';
  document.getElementById('fResponsable').value=c?(c.responsable||''):'';
  document.getElementById('fDateDebut').value=c?(c.date_debut||''):'';
  document.getElementById('fStatut').value=c?c.statut:'actif';
  document.getElementById('chantierModal').classList.remove('hidden');
  document.getElementById('chantierModal').classList.add('flex');
}
function closeModal(){document.getElementById('chantierModal').classList.add('hidden');document.getElementById('chantierModal').classList.remove('flex');}
function editChantier(id){const c=chantiers.find(x=>x.id===id);if(c)openModal(c);}
async function saveChantier(){
  const id=document.getElementById('editId').value;
  const data={nom:document.getElementById('fNom').value.trim(),ville:document.getElementById('fVille').value.trim(),responsable:document.getElementById('fResponsable').value.trim(),date_debut:document.getElementById('fDateDebut').value,statut:document.getElementById('fStatut').value};
  if(!data.nom){document.getElementById('modalError').textContent='Le nom est requis';document.getElementById('modalError').classList.remove('hidden');return;}
  const res=await fetch(id?`/api/chantiers/${id}`:'/api/chantiers',{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(!res.ok){const e=await res.json();document.getElementById('modalError').textContent=e.error||'Erreur';document.getElementById('modalError').classList.remove('hidden');return;}
  closeModal();loadChantiers();
}
async function deleteChantier(id){if(!confirm('Supprimer ce chantier ?'))return;await fetch(`/api/chantiers/${id}`,{method:'DELETE'});loadChantiers();}
loadChantiers();

</script>
</body>
</html>
