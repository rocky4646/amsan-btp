<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMSAN BTP - Fiche de paie</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @media print { body * { visibility: hidden; } #fichePaie, #fichePaie * { visibility: visible; } #fichePaie { position: absolute; left: 0; top: 0; width: 100%; } .no-print { display: none !important; } }
    .dark .sidebar-link:hover { background: rgba(59,130,246,0.1); color: #93c5fd; }
  </style>
  <script>if (localStorage.getItem('darkMode') === 'true') document.documentElement.classList.add('dark');</script>
</head>
<body class="bg-gray-50 dark:bg-slate-900 transition-colors duration-200">
  <div class="flex h-screen">
    <aside id="sidebar" class="bg-white dark:bg-slate-800 w-64 fixed h-full shadow-lg z-10 -translate-x-full md:translate-x-0 transition-all duration-300 border-r border-gray-200 dark:border-slate-700">
      <div class="p-5 border-b border-gray-200 dark:border-slate-700">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-blue-800 rounded-xl flex items-center justify-center text-white font-bold text-lg">A</div>
          <div><h1 class="text-lg font-bold text-gray-800 dark:text-white">AMSAN BTP</h1><p class="text-xs text-gray-500 dark:text-gray-400">Gestion de chantier</p></div>
        </div>
      </div>
      <nav class="p-3 space-y-1">
        <a href="index.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-chart-pie w-5 text-center"></i> Tableau de bord</a>
        <a href="ouvriers.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-users w-5 text-center"></i> Ouvriers</a>
        <a href="chantiers.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-hard-hat w-5 text-center"></i> Chantiers</a>
        <a href="pointage.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-clipboard-check w-5 text-center"></i> Pointage</a>
        <a href="depenses.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-coins w-5 text-center"></i> Dépenses</a>
        <a href="avances.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-hand-holding-usd w-5 text-center"></i> Avances</a>
        <a href="fiche-paie.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 font-medium"><i class="fas fa-file-invoice w-5 text-center"></i> Fiche de paie</a>
      </nav>
      <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-200 dark:border-slate-700">
        <button onclick="toggleDarkMode()" class="sidebar-link flex items-center gap-3 w-full px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50">
          <i class="fas fa-moon w-5 text-center dark:hidden"></i><i class="fas fa-sun w-5 text-center hidden dark:inline"></i>
          <span class="dark:hidden">Mode sombre</span><span class="hidden dark:inline">Mode clair</span>
        </button>
      </div>
    </aside>
    <div class="flex-1 md:ml-64 flex flex-col">
      <header class="bg-white dark:bg-slate-800 shadow-sm border-b border-gray-200 dark:border-slate-700 p-4 flex items-center gap-3 sticky top-0 z-10 no-print">
        <button id="menuBtn" class="md:hidden text-gray-600 dark:text-gray-300 text-xl"><i class="fas fa-bars"></i></button>
        <h2 class="text-lg font-semibold text-gray-800 dark:text-white">Fiche de paie</h2>
      </header>
      <main class="p-4 md:p-6 max-w-4xl mx-auto w-full overflow-y-auto">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm p-4 md:p-6 mb-6 no-print transition-all">
          <div class="grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
            <div>
              <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1.5">Ouvrier</label>
              <select id="fOuvrier" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none"><option value="">Sélectionner</option></select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1.5">Mois</label>
              <select id="fMois" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
                <option value="01">Janvier</option><option value="02">Février</option><option value="03">Mars</option><option value="04">Avril</option>
                <option value="05">Mai</option><option value="06">Juin</option><option value="07">Juillet</option><option value="08">Août</option>
                <option value="09">Septembre</option><option value="10">Octobre</option><option value="11">Novembre</option><option value="12">Décembre</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1.5">Année</label>
              <select id="fAnnee" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none"></select>
            </div>
            <button onclick="calculerFiche()" class="bg-gradient-to-r from-blue-600 to-blue-700 text-white px-6 py-3 rounded-xl hover:from-blue-700 hover:to-blue-800 shadow-md hover:shadow-lg transition-all h-12 flex items-center justify-center gap-2"><i class="fas fa-calculator"></i> Calculer</button>
          </div>
          <div id="calcError" class="mt-3 text-red-500 text-sm hidden"></div>
        </div>

        <div id="fichePaie" class="hidden bg-white dark:bg-slate-800 rounded-2xl shadow-sm p-6 md:p-8 transition-all">
          <div class="text-center border-b border-gray-200 dark:border-slate-700 pb-4 mb-6">
            <div class="flex items-center justify-center gap-3 mb-2">
              <div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl flex items-center justify-center text-white font-bold text-xl">A</div>
              <div>
                <h1 class="text-2xl font-bold text-gray-800 dark:text-white">AMSAN BTP</h1>
                <p class="text-sm text-gray-500 dark:text-gray-400">Fiche de paie</p>
              </div>
            </div>
          </div>
          <div id="ficheContent"></div>
          <div class="mt-8 text-center no-print">
            <button onclick="window.print()" class="bg-gradient-to-r from-blue-600 to-blue-700 text-white px-8 py-3 rounded-xl hover:from-blue-700 hover:to-blue-800 shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2 mx-auto"><i class="fas fa-print"></i> Imprimer</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    function toggleDarkMode() { const h=document.documentElement; h.classList.toggle('dark'); localStorage.setItem('darkMode', h.classList.contains('dark')); }
    document.getElementById('menuBtn')?.addEventListener('click', () => { document.getElementById('sidebar').classList.toggle('-translate-x-full'); });
    const yearSel=document.getElementById('fAnnee'); const y=new Date().getFullYear();
    for(let i=y-2;i<=y+1;i++) { const o=document.createElement('option'); o.value=i; o.textContent=i; if(i===y) o.selected=true; yearSel.appendChild(o); }
    document.getElementById('fMois').value=String(new Date().getMonth()+1).padStart(2,'0');

    async function loadOuvriers() {
      const r=await fetch('/api/ouvriers'); const list=await r.json();
      const sel=document.getElementById('fOuvrier');
      sel.innerHTML='<option value="">Sélectionner un ouvrier</option>'+list.filter(o=>o.actif).map(o=>`<option value="${o.id}">${o.nom}</option>`).join('');
    }

    async function calculerFiche() {
      const ouvrier_id=document.getElementById('fOuvrier').value;
      const mois=document.getElementById('fMois').value;
      const annee=document.getElementById('fAnnee').value;
      const errEl=document.getElementById('calcError');
      errEl.classList.add('hidden');
      if(!ouvrier_id) { errEl.textContent='Veuillez sélectionner un ouvrier'; errEl.classList.remove('hidden'); return; }
      const r=await fetch(`/api/fiches/calcul?ouvrier_id=${ouvrier_id}&mois=${mois}&annee=${annee}`);
      if(!r.ok) { const e=await r.json(); errEl.textContent=e.error||'Erreur de calcul'; errEl.classList.remove('hidden'); return; }
      afficherFiche(await r.json());
    }

    function afficherFiche(data) {
      const moisNom=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
      document.getElementById('fichePaie').classList.remove('hidden');
      document.getElementById('ficheContent').innerHTML = `
        <div class="grid grid-cols-2 gap-4 mb-6 text-sm">
          <div><span class="text-gray-500 dark:text-gray-400">Ouvrier :</span> <span class="font-medium text-gray-800 dark:text-gray-200">${[data.ouvrier.prenom, data.ouvrier.nom].filter(Boolean).join(' ')}</span></div>
          <div><span class="text-gray-500 dark:text-gray-400">Poste :</span> <span class="font-medium text-gray-800 dark:text-gray-200">${data.ouvrier.poste||'-'}</span></div>
          <div><span class="text-gray-500 dark:text-gray-400">Période :</span> <span class="font-medium text-gray-800 dark:text-gray-200">${moisNom[parseInt(data.periode.mois)-1]} ${data.periode.annee}</span></div>
          <div><span class="text-gray-500 dark:text-gray-400">Salaire journalier :</span> <span class="font-medium text-gray-800 dark:text-gray-200">${parseFloat(data.salaire_journalier||0).toFixed(2)} MAD</span></div>
        </div>
        <table class="w-full text-sm mb-6">
          <thead>
            <tr class="bg-gray-50 dark:bg-slate-700/50 text-gray-600 dark:text-gray-300">
              <th class="text-left p-3 font-medium">Libellé</th>
              <th class="text-right p-3 font-medium">Montant</th>
            </tr>
          </thead>
          <tbody>
            <tr class="border-b border-gray-200 dark:border-slate-700">
              <td class="p-3 text-gray-700 dark:text-gray-300">Jours travaillés (${data.jours_travailles} jours × ${parseFloat(data.salaire_journalier||0).toFixed(2)} MAD)</td>
              <td class="p-3 text-right font-medium text-gray-800 dark:text-gray-200">${parseFloat(data.salaire_normal||0).toFixed(2)} MAD</td>
            </tr>
            <tr class="border-b border-gray-200 dark:border-slate-700">
              <td class="p-3 text-gray-700 dark:text-gray-300">Heures supplémentaires (${parseFloat(data.total_hs||0).toFixed(1)} h × ${parseFloat(data.tarif_hs||0).toFixed(2)} MAD)</td>
              <td class="p-3 text-right font-medium text-gray-800 dark:text-gray-200">${parseFloat(data.montant_hs||0).toFixed(2)} MAD</td>
            </tr>
            <tr class="border-b border-gray-200 dark:border-slate-700 font-semibold">
              <td class="p-3 text-gray-800 dark:text-gray-200">Salaire brut</td>
              <td class="p-3 text-right text-gray-800 dark:text-gray-200">${parseFloat(data.salaire_brut||0).toFixed(2)} MAD</td>
            </tr>
            <tr class="border-b border-gray-200 dark:border-slate-700 text-red-600 dark:text-red-400">
              <td class="p-3">Avances déduites</td>
              <td class="p-3 text-right">- ${parseFloat(data.total_avances||0).toFixed(2)} MAD</td>
            </tr>
            <tr class="bg-blue-50 dark:bg-blue-900/20 font-bold text-lg">
              <td class="p-3 text-blue-800 dark:text-blue-300">Net à payer</td>
              <td class="p-3 text-right text-blue-800 dark:text-blue-300">${parseFloat(data.net_a_payer||0).toFixed(2)} MAD</td>
            </tr>
          </tbody>
        </table>
        <p class="text-xs text-gray-400 dark:text-gray-500 text-center mt-4">Document généré le ${new Date().toLocaleDateString('fr-FR')}</p>
      `;
    }

    loadOuvriers();
  </script>
</body>
</html>
