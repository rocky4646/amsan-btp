  <header class="bg-white dark:bg-slate-800 shadow-sm border-b border-gray-200 dark:border-slate-700 p-4 flex items-center gap-3 sticky top-0 z-10">

  <h3 class="font-semibold text-gray-800 dark:text-white mb-3 text-sm flex items-center gap-2"><i class="fas fa-calculator text-blue-500"></i> Calculer la fiche de paie</h3>
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3">
    <div>
      <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">Ouvrier</label>
      <select id="fOuvrier" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none"><option value="">Sélectionner</option></select>
    </div>
    <div>
      <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">Mois</label>
      <select id="fMois" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
        <option value="01">Janvier</option><option value="02">Février</option><option value="03">Mars</option><option value="04">Avril</option>
        <option value="05">Mai</option><option value="06">Juin</option><option value="07">Juillet</option><option value="08">Août</option>
        <option value="09">Septembre</option><option value="10">Octobre</option><option value="11">Novembre</option><option value="12">Décembre</option>
      </select>
    </div>
    <div>
      <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">Année</label>
      <select id="fAnnee" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none"></select>
    </div>
    <div class="flex items-end">
      <button onclick="calculerFiche()" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white px-5 py-3 rounded-xl shadow-md flex items-center justify-center gap-2"><i class="fas fa-calculator"></i> Calculer</button>
    </div>
  </div>

<div id="fichePaie" class="hidden bg-white dark:bg-slate-800 rounded-2xl shadow-sm p-5 md:p-8">
  <div class="text-center border-b border-gray-200 dark:border-slate-700 pb-4 mb-5">
    <div class="flex items-center justify-center gap-3 mb-1">
      <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-blue-800 rounded-xl flex items-center justify-center text-white font-bold text-lg">A</div>
      <div><h1 class="text-xl font-bold text-gray-800 dark:text-white">AMSAN BTP</h1><p class="text-xs text-gray-500 dark:text-gray-400">Fiche de paie</p></div>

<div id="moreDrawer" class="md:hidden fixed bottom-16 left-0 right-0 bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 z-30 hidden shadow-2xl rounded-t-2xl">
  <div class="p-2 flex justify-around">
    <a href="chantiers.html" class="flex flex-col items-center gap-1 p-4 rounded-xl text-sm text-gray-600 dark:text-gray-300"><i class="fas fa-hard-hat text-2xl text-orange-500"></i><span>Chantiers</span></a>
    <a href="avances.html" class="flex flex-col items-center gap-1 p-4 rounded-xl text-sm text-gray-600 dark:text-gray-300"><i class="fas fa-hand-holding-usd text-2xl text-amber-500"></i><span>Avances</span></a>
    <a href="fiche-paie.html" class="flex flex-col items-center gap-1 p-4 rounded-xl text-sm text-blue-600 font-medium"><i class="fas fa-file-invoice text-2xl text-blue-500"></i><span>Fiche de paie</span></a>
    <button onclick="toggleDarkMode()" class="flex flex-col items-center gap-1 p-4 rounded-xl text-sm text-gray-600 dark:text-gray-300"><i class="fas fa-moon text-2xl text-slate-500 dark:hidden"></i><i class="fas fa-sun text-2xl text-yellow-400 hidden dark:inline"></i><span class="dark:hidden">Sombre</span><span class="hidden dark:inline">Clair</span></button>
  </div>
</div>
<!-- BOTTOM NAV -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 z-20 flex justify-around items-center h-16 px-1">
<a href="index.html" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400"><i class="fas fa-chart-pie text-xl"></i><span>Accueil</span></a>
<a href="ouvriers.html" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400"><i class="fas fa-users text-xl"></i><span>Ouvriers</span></a>
<a href="pointage.html" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400"><i class="fas fa-clipboard-check text-xl"></i><span>Pointage</span></a>
<a href="depenses.html" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400"><i class="fas fa-coins text-xl"></i><span>Dépenses</span></a>
<button onclick="toggleMore()" class="flex flex-col items-center gap-0.5 text-xs text-blue-600 dark:text-blue-400" id="moreBtn"><i class="fas fa-ellipsis-h text-xl"></i><span>Plus</span></button>

</nav>
<script>
function toggleMore(){
  const d=document.getElementById('moreDrawer');
  d.classList.toggle('hidden');
  document.getElementById('moreBtn').querySelector('i').className = d.classList.contains('hidden') ? 'fas fa-ellipsis-h text-xl' : 'fas fa-times text-xl';
}
document.addEventListener('click',function(e){
  const d=document.getElementById('moreDrawer');
  const btn=document.getElementById('moreBtn');
  if(!d.classList.contains('hidden')&&!d.contains(e.target)&&!btn.contains(e.target)){
    d.classList.add('hidden');
    btn.querySelector('i').className='fas fa-ellipsis-h text-xl';
  }
});
</script>
<script>

let lastFicheData=null;
const yearSel=document.getElementById('fAnnee');const y=new Date().getFullYear();
for(let i=y-2;i<=y+1;i++){const o=document.createElement('option');o.value=i;o.textContent=i;if(i===y)o.selected=true;yearSel.appendChild(o);}
document.getElementById('fMois').value=String(new Date().getMonth()+1).padStart(2,'0');
async function loadOuvriers(){const r=await fetch('/api/ouvriers');const list=await r.json();const sel=document.getElementById('fOuvrier');sel.innerHTML='<option value="">Sélectionner un ouvrier</option>'+list.filter(o=>o.actif).map(o=>`<option value="${o.id}">${o.nom}</option>`).join('');}
async function calculerFiche(){
  const ouvrier_id=document.getElementById('fOuvrier').value,mois=document.getElementById('fMois').value,annee=document.getElementById('fAnnee').value;
  const errEl=document.getElementById('calcError');errEl.classList.add('hidden');
  if(!ouvrier_id){errEl.textContent='Veuillez sélectionner un ouvrier';errEl.classList.remove('hidden');return;}
  const r=await fetch(`/api/fiches/calcul?ouvrier_id=${ouvrier_id}&mois=${mois}&annee=${annee}`);
  if(!r.ok){const e=await r.json();errEl.textContent=e.error||'Erreur';errEl.classList.remove('hidden');return;}
  afficherFiche(await r.json());
}
function afficherFiche(data){lastFicheData=data;
  const moisNom=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  document.getElementById('fichePaie').classList.remove('hidden');
  document.getElementById('ficheContent').innerHTML=`
    <div class="grid grid-cols-2 gap-3 mb-5 text-sm">
      <div class="bg-gray-50 dark:bg-slate-700/50 rounded-xl p-3"><div class="text-xs text-gray-400 mb-0.5">Ouvrier</div><div class="font-semibold text-gray-800 dark:text-gray-200">${[data.ouvrier.prenom,data.ouvrier.nom].filter(Boolean).join(' ')}</div></div>
      <div class="bg-gray-50 dark:bg-slate-700/50 rounded-xl p-3"><div class="text-xs text-gray-400 mb-0.5">Poste</div><div class="font-semibold text-gray-800 dark:text-gray-200">${data.ouvrier.poste||'-'}</div></div>
      <div class="bg-gray-50 dark:bg-slate-700/50 rounded-xl p-3"><div class="text-xs text-gray-400 mb-0.5">Période</div><div class="font-semibold text-gray-800 dark:text-gray-200">${moisNom[parseInt(data.periode.mois)-1]} ${data.periode.annee}</div></div>
      <div class="bg-gray-50 dark:bg-slate-700/50 rounded-xl p-3"><div class="text-xs text-gray-400 mb-0.5">Salaire/jour</div><div class="font-semibold text-gray-800 dark:text-gray-200">${parseFloat(data.salaire_journalier||0).toFixed(2)} MAD</div></div>
    </div>
    <div class="space-y-2 mb-5">
      <div class="flex justify-between items-center p-3 bg-gray-50 dark:bg-slate-700/50 rounded-xl text-sm">
        <span class="text-gray-600 dark:text-gray-300">Jours travaillés (${data.jours_travailles}j × ${parseFloat(data.salaire_journalier||0).toFixed(2)} MAD)</span>
        <span class="font-semibold text-gray-800 dark:text-gray-200">${parseFloat(data.salaire_normal||0).toFixed(2)} MAD</span>
      </div>
      <div class="flex justify-between items-center p-3 bg-gray-50 dark:bg-slate-700/50 rounded-xl text-sm">
        <span class="text-gray-600 dark:text-gray-300">Heures supp. (${parseFloat(data.total_hs||0).toFixed(1)}h × ${parseFloat(data.tarif_hs||0).toFixed(2)} MAD)</span>
        <span class="font-semibold text-gray-800 dark:text-gray-200">${parseFloat(data.montant_hs||0).toFixed(2)} MAD</span>
      </div>
      <div class="flex justify-between items-center p-3 bg-blue-50 dark:bg-blue-900/20 rounded-xl text-sm font-semibold">
        <span class="text-gray-700 dark:text-gray-200">Salaire brut</span>
        <span class="text-gray-800 dark:text-gray-200">${parseFloat(data.salaire_brut||0).toFixed(2)} MAD</span>
      </div>
      <div class="flex justify-between items-center p-3 bg-red-50 dark:bg-red-900/10 rounded-xl text-sm">
        <span class="text-red-600 dark:text-red-400">Avances déduites</span>
        <span class="font-semibold text-red-600 dark:text-red-400">- ${parseFloat(data.total_avances||0).toFixed(2)} MAD</span>
      </div>
      <div class="flex justify-between items-center p-4 bg-gradient-to-r from-blue-600 to-blue-700 rounded-xl text-white font-bold text-lg">
        <span>Net à payer</span>
        <span>${parseFloat(data.net_a_payer||0).toFixed(2)} MAD</span>
      </div>
    </div>
    <p class="text-xs text-gray-400 dark:text-gray-500 text-center">Généré le ${new Date().toLocaleDateString('fr-FR')}</p>`;
  document.getElementById('fichePaie').scrollIntoView({behavior:'smooth',block:'start'});
}
function exportPDF(){
  if(!lastFicheData){alert('Veuillez d\'abord calculer une fiche de paie.');return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const d=lastFicheData;
  const moisNom=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const nom=[d.ouvrier.prenom,d.ouvrier.nom].filter(Boolean).join(' ');
  const periode=moisNom[parseInt(d.periode.mois)-1]+' '+d.periode.annee;
  // En-tête
  doc.setFillColor(37,99,235);doc.rect(0,0,210,28,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(18);doc.setFont('helvetica','bold');
  doc.text('AMSAN BTP',15,12);
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text('Fiche de paie',15,20);
  doc.setFontSize(11);doc.text(periode,195,16,{align:'right'});
  // Infos ouvrier
  doc.setTextColor(30,41,59);doc.setFontSize(11);doc.setFont('helvetica','bold');
  doc.text('Ouvrier',15,38);doc.setFont('helvetica','normal');doc.text(nom,70,38);
  doc.text('Poste',15,46);doc.setFont('helvetica','normal');doc.text(d.ouvrier.poste||'-',70,46);
  doc.text('Salaire journalier',15,54);doc.text(parseFloat(d.salaire_journalier||0).toFixed(2)+' MAD',70,54);
  // Ligne séparatrice
  doc.setDrawColor(226,232,240);doc.line(15,60,195,60);
  // Détail calcul
  doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(71,85,105);
  const rows=[
    ['Jours travaillés',`${d.jours_travailles}j × ${parseFloat(d.salaire_journalier||0).toFixed(2)} MAD`,parseFloat(d.salaire_normal||0).toFixed(2)+' MAD'],
    ['Heures supplémentaires',`${parseFloat(d.total_hs||0).toFixed(1)}h × ${parseFloat(d.tarif_hs||0).toFixed(2)} MAD`,parseFloat(d.montant_hs||0).toFixed(2)+' MAD'],
    ['Salaire brut','',parseFloat(d.salaire_brut||0).toFixed(2)+' MAD'],
    ['Avances déduites','','- '+parseFloat(d.total_avances||0).toFixed(2)+' MAD'],
  ];
  let y=70;
  rows.forEach((row,i)=>{
    if(i===2){doc.setFillColor(239,246,255);doc.rect(14,y-5,182,10,'F');}
    if(i===3){doc.setFillColor(254,242,242);doc.rect(14,y-5,182,10,'F');}
    doc.setTextColor(i===2?37:i===3?220:71,i===2?99:i===3?38:85,i===2?235:i===3?38:105);
    doc.setFont('helvetica',i===2?'bold':'normal');
    doc.text(row[0],17,y);if(row[1])doc.text(row[1],80,y);doc.text(row[2],193,y,{align:'right'});
    y+=12;
  });
  // Net à payer
  doc.setFillColor(37,99,235);doc.rect(14,y-5,182,14,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(13);
  doc.text('Net à payer',17,y+4);
  doc.text(parseFloat(d.net_a_payer||0).toFixed(2)+' MAD',193,y+4,{align:'right'});
  // Pied de page
  doc.setFontSize(8);doc.setTextColor(148,163,184);doc.setFont('helvetica','normal');
  doc.text('Généré le '+new Date().toLocaleDateString('fr-FR')+' — AMSAN BTP',105,285,{align:'center'});
  doc.save(`fiche-paie_${nom.replace(/ /g,'_')}_${periode.replace(/ /g,'_')}.pdf`);
}
loadOuvriers();

</script>
</body>
</html>
