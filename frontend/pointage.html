<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMSAN BTP - Pointage</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>.dark .sidebar-link:hover { background: rgba(59,130,246,0.1); color: #93c5fd; }</style>
  <script>if (localStorage.getItem('darkMode') === 'true') document.documentElement.classList.add('dark');</script>
</head>
<body class="bg-gray-50 dark:bg-slate-900 transition-colors duration-200">
  <div class="flex h-screen">
    <aside id="sidebar" class="bg-white dark:bg-slate-800 w-64 fixed h-full shadow-lg z-10 -translate-x-full md:translate-x-0 transition-all duration-300 border-r border-gray-200 dark:border-slate-700">
      <div class="p-5 border-b border-gray-200 dark:border-slate-700">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-blue-800 rounded-xl flex items-center justify-center text-white font-bold text-lg">A</div>
          <div><h1 class="text-lg font-bold text-gray-800 dark:text-white">AMSAN BTP</h1><p class="text-xs text-gray-500 dark:text-gray-400">Gestion de chantier</p></div>
        </div>
      </div>
      <nav class="p-3 space-y-1">
        <a href="index.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-chart-pie w-5 text-center"></i> Tableau de bord</a>
        <a href="ouvriers.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-users w-5 text-center"></i> Ouvriers</a>
        <a href="chantiers.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-hard-hat w-5 text-center"></i> Chantiers</a>
        <a href="pointage.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 font-medium"><i class="fas fa-clipboard-check w-5 text-center"></i> Pointage</a>
        <a href="depenses.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-coins w-5 text-center"></i> Dépenses</a>
        <a href="avances.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-hand-holding-usd w-5 text-center"></i> Avances</a>
        <a href="fiche-paie.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50"><i class="fas fa-file-invoice w-5 text-center"></i> Fiche de paie</a>
      </nav>
      <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-200 dark:border-slate-700">
        <button onclick="toggleDarkMode()" class="sidebar-link flex items-center gap-3 w-full px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-slate-700/50">
          <i class="fas fa-moon w-5 text-center dark:hidden"></i>
          <i class="fas fa-sun w-5 text-center hidden dark:inline"></i>
          <span class="dark:hidden">Mode sombre</span>
          <span class="hidden dark:inline">Mode clair</span>
        </button>
      </div>
    </aside>
    <div class="flex-1 md:ml-64 flex flex-col">
      <header class="bg-white dark:bg-slate-800 shadow-sm border-b border-gray-200 dark:border-slate-700 p-4 flex items-center gap-3 sticky top-0 z-10">
        <button id="menuBtn" class="md:hidden text-gray-600 dark:text-gray-300 text-xl"><i class="fas fa-bars"></i></button>
        <h2 class="text-lg font-semibold text-gray-800 dark:text-white">Pointage</h2>
      </header>
      <main class="p-4 md:p-6 max-w-6xl mx-auto w-full overflow-y-auto">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm p-4 md:p-6 mb-6 transition-all">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <div>
              <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1.5">Date</label>
              <input type="date" id="pointageDate" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1.5">Chantier</label>
              <select id="chantierSelect" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
                <option value="">Sélectionner un chantier</option>
              </select>
            </div>
            <div class="flex items-end">
              <button onclick="loadPointage()" class="bg-gradient-to-r from-blue-600 to-blue-700 text-white px-6 py-3 rounded-xl hover:from-blue-700 hover:to-blue-800 shadow-md hover:shadow-lg transition-all w-full h-12 flex items-center justify-center gap-2"><i class="fas fa-search"></i> Charger</button>
            </div>
          </div>
        </div>

        <div id="pointageArea" class="hidden">
          <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm overflow-hidden mb-4 transition-all">
            <div class="p-4 md:p-5 border-b border-gray-200 dark:border-slate-700 flex justify-between items-center">
              <h3 class="font-semibold text-gray-800 dark:text-white flex items-center gap-2"><i class="fas fa-users text-blue-500"></i> Ouvriers</h3>
              <span id="countPresence" class="text-sm text-gray-500 dark:text-gray-400"></span>
            </div>
            <div id="ouvriersList" class="divide-y divide-gray-100 dark:divide-slate-700"></div>
          </div>
          <div class="flex flex-col md:flex-row gap-3 items-start md:items-center">
            <button onclick="saveAllPointage()" class="bg-gradient-to-r from-emerald-500 to-emerald-600 text-white px-8 py-4 rounded-xl hover:from-emerald-600 hover:to-emerald-700 shadow-md hover:shadow-lg transition-all text-lg font-medium flex items-center justify-center gap-2"><i class="fas fa-save"></i> Enregistrer tout</button>
            <div id="saveMessage" class="text-sm hidden px-4 py-2 rounded-lg"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    function toggleDarkMode() { const h=document.documentElement; h.classList.toggle('dark'); localStorage.setItem('darkMode', h.classList.contains('dark')); }
    document.getElementById('menuBtn')?.addEventListener('click', () => { document.getElementById('sidebar').classList.toggle('-translate-x-full'); });
    document.getElementById('pointageDate').value = new Date().toISOString().split('T')[0];

    let ouvriersActifs = [], pointagesLoaded = [];

    async function loadChantiers() {
      const r=await fetch('/api/chantiers'); const list=await r.json();
      const sel=document.getElementById('chantierSelect');
      sel.innerHTML = '<option value="">Sélectionner un chantier</option>' + list.filter(c=>c.statut==='actif').map(c=>`<option value="${c.id}">${c.nom}</option>`).join('');
    }

    async function loadOuvriers() { const r=await fetch('/api/ouvriers?actif=1'); ouvriersActifs=await r.json(); }

    async function loadPointage() {
      const date=document.getElementById('pointageDate').value;
      const chantier_id=document.getElementById('chantierSelect').value;
      if (!date||!chantier_id) { alert('Veuillez sélectionner une date et un chantier'); return; }
      await loadOuvriers();
      const r=await fetch(`/api/pointages/by-date-chantier?date=${date}&chantier_id=${chantier_id}`);
      pointagesLoaded=await r.json();
      document.getElementById('pointageArea').classList.remove('hidden');
      renderOuvriers();
    }

    function renderOuvriers() {
      const container=document.getElementById('ouvriersList');
      const presences=document.getElementById('countPresence');
      let count=0;
      container.innerHTML = ouvriersActifs.map(o => {
        const existing=pointagesLoaded.find(p=>p.ouvrier_id===o.id);
        const present=existing?existing.present:false;
        const hs=existing?(existing.hs||0):0;
        if(present) count++;
        return `<div class="p-4 flex flex-col md:flex-row md:items-center gap-3 transition-colors hover:bg-gray-50 dark:hover:bg-slate-700/20" data-ouvrier-id="${o.id}">
          <div class="flex-1 font-medium text-gray-800 dark:text-gray-200">${[o.prenom, o.nom].filter(Boolean).join(' ')}</div>
          <div class="flex items-center gap-3">
            <button onclick="togglePresence(this)" class="px-6 py-3 rounded-xl font-medium text-sm min-w-[130px] border-2 transition-all h-12 ${present ? 'bg-emerald-500 text-white border-emerald-500 shadow-sm' : 'bg-white dark:bg-slate-700 text-gray-600 dark:text-gray-300 border-gray-300 dark:border-slate-600 hover:border-emerald-300'}">${present ? 'Présent' : 'Absent'}</button>
            <div class="hs-field ${present ? '' : 'opacity-40 pointer-events-none'}">
              <label class="text-xs text-gray-500 dark:text-gray-400 block mb-0.5">HS (h)</label>
              <input type="number" step="0.5" min="0" value="${hs}" class="w-20 px-3 py-2 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 text-center" ${present ? '' : 'disabled'}>
            </div>
          </div>
        </div>`;
      }).join('');
      presences.textContent = `${count} présent(s) sur ${ouvriersActifs.length}`;
    }

    function togglePresence(btn) {
      const isPresent=btn.textContent.trim()==='Absent';
      btn.textContent=isPresent?'Présent':'Absent';
      btn.className=`px-6 py-3 rounded-xl font-medium text-sm min-w-[130px] border-2 transition-all h-12 ${isPresent ? 'bg-emerald-500 text-white border-emerald-500 shadow-sm' : 'bg-white dark:bg-slate-700 text-gray-600 dark:text-gray-300 border-gray-300 dark:border-slate-600 hover:border-emerald-300'}`;
      const container=btn.closest('[data-ouvrier-id]');
      const hsField=container.querySelector('.hs-field');
      const hsInput=hsField.querySelector('input');
      hsField.classList.toggle('opacity-40', !isPresent);
      hsField.classList.toggle('pointer-events-none', !isPresent);
      hsInput.disabled=!isPresent;
      if(!isPresent) hsInput.value=0;
      updateCount();
    }

    function updateCount() {
      let count=0;
      document.querySelectorAll('#ouvriersList [data-ouvrier-id]').forEach(div=>{
        if(div.querySelector('button').textContent.trim()==='Présent') count++;
      });
      document.getElementById('countPresence').textContent=`${count} présent(s) sur ${ouvriersActifs.length}`;
    }

    async function saveAllPointage() {
      const date=document.getElementById('pointageDate').value;
      const chantier_id=document.getElementById('chantierSelect').value;
      const msg=document.getElementById('saveMessage');
      const btn=document.querySelector('button[onclick="saveAllPointage()"]');
      if(!date||!chantier_id){alert('Veuillez charger un pointage avant d\'enregistrer');return;}
      msg.classList.add('hidden');
      btn.disabled=true;
      const items=[];
      document.querySelectorAll('#ouvriersList [data-ouvrier-id]').forEach(div=>{
        const ouvrier_id=parseInt(div.dataset.ouvrierId);
        const present=div.querySelector('button').textContent.trim()==='Présent';
        const hs=present?parseFloat(div.querySelector('.hs-field input').value)||0:0;
        items.push({ouvrier_id,present,hs});
      });
      try {
        const res=await fetch('/api/pointages/batch', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({date,chantier_id,pointages:items})});
        if(!res.ok) { const err=await res.json(); msg.textContent='Erreur : '+(err.error||'Échec'); msg.className='text-sm bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 px-4 py-2 rounded-lg'; }
        else { msg.textContent='Pointage enregistré avec succès !'; msg.className='text-sm bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 dark:text-emerald-400 px-4 py-2 rounded-lg'; }
      } catch(e) {
        msg.textContent='Erreur réseau : impossible de joindre le serveur'; msg.className='text-sm bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 px-4 py-2 rounded-lg';
      }
      btn.disabled=false;
      msg.classList.remove('hidden');
      setTimeout(()=>msg.classList.add('hidden'), 3000);
    }

    loadChantiers();
  </script>
</body>
</html>
