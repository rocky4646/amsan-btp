<a href="ouvriers.html" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400"><i class="fas fa-users text-xl"></i><span>Ouvriers</span></a>

<a href="depenses.html" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400"><i class="fas fa-coins text-xl"></i><span>Dépenses</span></a>
<button onclick="toggleMore()" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400" id="moreBtn"><i class="fas fa-ellipsis-h text-xl"></i><span>Plus</span></button>

</nav>
<script>
function toggleMore(){
  const d=document.getElementById('moreDrawer');
  d.classList.toggle('hidden');
  document.getElementById('moreBtn').querySelector('i').className = d.classList.contains('hidden') ? 'fas fa-ellipsis-h text-xl' : 'fas fa-times text-xl';
}
document.addEventListener('click',function(e){
  const d=document.getElementById('moreDrawer');
  const btn=document.getElementById('moreBtn');
  if(!d.classList.contains('hidden')&&!d.contains(e.target)&&!btn.contains(e.target)){
    d.classList.add('hidden');
    btn.querySelector('i').className='fas fa-ellipsis-h text-xl';
  }
});
</script>
<script>

document.getElementById('pointageDate').value=new Date().toISOString().split('T')[0];
let ouvriersActifs=[],pointagesLoaded=[];
async function loadChantiers(){const r=await fetch('/api/chantiers');const list=await r.json();const sel=document.getElementById('chantierSelect');sel.innerHTML='<option value="">Sélectionner un chantier</option>'+list.filter(c=>c.statut==='actif').map(c=>`<option value="${c.id}">${c.nom}</option>`).join('');}
async function loadOuvriers(){const r=await fetch('/api/ouvriers?actif=1');ouvriersActifs=await r.json();}
async function loadPointage(){
  const date=document.getElementById('pointageDate').value,chantier_id=document.getElementById('chantierSelect').value;
  if(!date||!chantier_id){alert('Veuillez sélectionner une date et un chantier');return;}
  await loadOuvriers();
  const r=await fetch(`/api/pointages/by-date-chantier?date=${date}&chantier_id=${chantier_id}`);
  pointagesLoaded=await r.json();
  document.getElementById('pointageArea').classList.remove('hidden');
  renderOuvriers();
}
function renderOuvriers(){
  let count=0;
  document.getElementById('ouvriersList').innerHTML=ouvriersActifs.map(o=>{
    const ex=pointagesLoaded.find(p=>p.ouvrier_id===o.id);
    const present=ex?ex.present:false;const hs=ex?(ex.hs||0):0;
    if(present)count++;
    return `<div class="p-4 flex flex-col sm:flex-row sm:items-center gap-3" data-ouvrier-id="${o.id}">
      <div class="flex-1 font-medium text-gray-800 dark:text-gray-200">${[o.prenom,o.nom].filter(Boolean).join(' ')}</div>
      <div class="flex items-center gap-3">
        <button onclick="togglePresence(this)" class="flex-1 sm:flex-none px-5 py-2.5 rounded-xl font-medium text-sm min-w-[120px] border-2 transition-all text-center ${present?'bg-emerald-500 text-white border-emerald-500 shadow-sm':'bg-white dark:bg-slate-700 text-gray-600 dark:text-gray-300 border-gray-300 dark:border-slate-600'}">${present?'Présent ✓':'Absent'}</button>
        <div class="hs-field ${present?'':'opacity-40 pointer-events-none'}">
          <div class="text-xs text-gray-400 text-center mb-0.5">HS</div>
          <input type="number" step="0.5" min="0" value="${hs}" class="w-16 px-2 py-2 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 text-center text-sm" ${present?'':'disabled'}>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('countPresence').textContent=`${count}/${ouvriersActifs.length} présents`;
}
function togglePresence(btn){
  const isP=btn.textContent.trim().startsWith('Absent');
  btn.textContent=isP?'Présent ✓':'Absent';
  btn.className=`flex-1 sm:flex-none px-5 py-2.5 rounded-xl font-medium text-sm min-w-[120px] border-2 transition-all text-center ${isP?'bg-emerald-500 text-white border-emerald-500 shadow-sm':'bg-white dark:bg-slate-700 text-gray-600 dark:text-gray-300 border-gray-300 dark:border-slate-600'}`;
  const c=btn.closest('[data-ouvrier-id]');
  const hf=c.querySelector('.hs-field');const hi=hf.querySelector('input');
  hf.classList.toggle('opacity-40',!isP);hf.classList.toggle('pointer-events-none',!isP);hi.disabled=!isP;if(!isP)hi.value=0;
  let cnt=0;document.querySelectorAll('#ouvriersList [data-ouvrier-id]').forEach(d=>{if(d.querySelector('button').textContent.trim().startsWith('Présent'))cnt++;});
  document.getElementById('countPresence').textContent=`${cnt}/${ouvriersActifs.length} présents`;
}
async function saveAllPointage(){
  const date=document.getElementById('pointageDate').value,chantier_id=document.getElementById('chantierSelect').value;
  if(!date||!chantier_id){alert('Charger un pointage avant d\'enregistrer');return;}
  const msg=document.getElementById('saveMessage');const btn=document.querySelector('button[onclick="saveAllPointage()"]');
  msg.classList.add('hidden');btn.disabled=true;
  const items=[];
  document.querySelectorAll('#ouvriersList [data-ouvrier-id]').forEach(div=>{
    const present=div.querySelector('button').textContent.trim().startsWith('Présent');
    items.push({ouvrier_id:parseInt(div.dataset.ouvrierId),present,hs:present?parseFloat(div.querySelector('.hs-field input').value)||0:0});
  });
  try{
    const res=await fetch('/api/pointages/batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({date,chantier_id,pointages:items})});
    if(!res.ok){const e=await res.json();msg.textContent='Erreur : '+(e.error||'Échec');msg.className='text-sm bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 px-4 py-3 rounded-xl';}
    else{msg.textContent='✓ Pointage enregistré !';msg.className='text-sm bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 dark:text-emerald-400 px-4 py-3 rounded-xl';}
  }catch(e){msg.textContent='Erreur réseau';msg.className='text-sm bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 px-4 py-3 rounded-xl';}
  btn.disabled=false;msg.classList.remove('hidden');setTimeout(()=>msg.classList.add('hidden'),3000);
}
function exportExcel(){
  if(!ouvriersActifs||ouvriersActifs.length===0){alert('Veuillez d\'abord charger un pointage.');return;}
  const date=document.getElementById('pointageDate').value;
  const chantierNom=document.getElementById('chantierSelect').options[document.getElementById('chantierSelect').selectedIndex]?.text||'';
  const rows=[];
  document.querySelectorAll('#ouvriersList [data-ouvrier-id]').forEach(div=>{
    const ouvrId=parseInt(div.dataset.ouvrierId);
    const o=ouvriersActifs.find(x=>x.id===ouvrId);
    const present=div.querySelector('button').textContent.trim().startsWith('Présent');
    const hs=present?parseFloat(div.querySelector('.hs-field input').value)||0:0;
    rows.push({'Date':date,'Chantier':chantierNom,'Ouvrier':[o?.prenom,o?.nom].filter(Boolean).join(' '),'Présent':present?'Oui':'Non','Heures supp.':hs});
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:25},{wch:25},{wch:10},{wch:14}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Pointage');
  XLSX.writeFile(wb,`pointage_${date}_AMSAN-BTP.xlsx`);
}
loadChantiers();

</script>
