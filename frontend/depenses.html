<div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm p-4 mb-4">
  <h3 class="font-semibold text-gray-800 dark:text-white mb-3 text-sm flex items-center gap-2"><i class="fas fa-plus-circle text-emerald-500"></i> Ajouter une dépense</h3>
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
    <input type="date" id="fDate" class="px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
    <select id="fChantier" class="px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none"><option value="">Chantier *</option></select>
    <select id="fCategorie" class="px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
      <option value="materiaux">Matériaux</option><option value="transport">Transport</option><option value="nourriture">Nourriture</option><option value="location">Location</option><option value="divers">Divers</option>
    </select>
    <input type="number" step="0.01" id="fMontant" placeholder="Montant (MAD) *" class="px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
    <input type="text" id="fNote" placeholder="Note (optionnel)" class="sm:col-span-2 px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
  </div>
  <div id="formError" class="mt-2 text-red-500 text-sm hidden"></div>
  <button onclick="addDepense()" class="mt-3 w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-3 rounded-xl shadow-md flex items-center justify-center gap-2"><i class="fas fa-plus"></i> Ajouter la dépense</button>
</div>

<div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm p-4">
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">
    <select id="filterChantier" class="px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none"><option value="">Tous les chantiers</option></select>
    <select id="filterCategorie" class="px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
      <option value="">Toutes catégories</option>
      <option value="materiaux">Matériaux</option><option value="transport">Transport</option><option value="nourriture">Nourriture</option><option value="location">Location</option><option value="divers">Divers</option>
    </select>
    <select id="filterMois" class="px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none">
      <option value="">Tous les mois</option>
      <option value="01">Janvier</option><option value="02">Février</option><option value="03">Mars</option><option value="04">Avril</option><option value="05">Mai</option><option value="06">Juin</option>
      <option value="07">Juillet</option><option value="08">Août</option><option value="09">Septembre</option><option value="10">Octobre</option><option value="11">Novembre</option><option value="12">Décembre</option>
    </select>
    <select id="filterAnnee" class="px-4 py-3 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-blue-400 focus:outline-none"></select>
  </div>

  <!-- MOBILE CARDS -->
  <div id="depenseCards" class="md:hidden space-y-3"></div>

  <!-- DESKTOP TABLE -->
  <div class="hidden md:block overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 dark:bg-slate-700/50 text-gray-600 dark:text-gray-300">
        <tr><th class="text-left p-4 font-medium">Date</th><th class="text-left p-4 font-medium">Chantier</th><th class="text-left p-4 font-medium">Catégorie</th><th class="text-left p-4 font-medium">Montant</th><th class="text-left p-4 font-medium">Note</th><th class="p-4"></th></tr>
      </thead>
      <tbody id="depensesTable"></tbody>
    </table>
  </div>
  <div class="flex flex-wrap justify-between items-center gap-3 mt-4 pt-3 border-t border-gray-100 dark:border-slate-700">
    <span class="text-sm text-gray-500 dark:text-gray-400" id="depCount">0 dépense(s)</span>
    <div class="flex items-center gap-3">
      <span class="font-bold text-gray-800 dark:text-white">Total : <span id="totalMontant">0.00</span> MAD</span>
      <button onclick="exportExcel()" class="bg-gradient-to-r from-emerald-600 to-emerald-700 text-white px-4 py-2 rounded-xl shadow-sm flex items-center gap-2 text-sm"><i class="fas fa-file-excel"></i> Exporter Excel</button>
    </div>

<!-- MORE DRAWER -->
<div id="moreDrawer" class="md:hidden fixed bottom-16 left-0 right-0 bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 z-30 hidden shadow-2xl rounded-t-2xl">
  <div class="p-2 flex justify-around">
    <a href="chantiers.html" class="flex flex-col items-center gap-1 p-4 rounded-xl text-sm text-gray-600 dark:text-gray-300"><i class="fas fa-hard-hat text-2xl text-orange-500"></i><span>Chantiers</span></a>
    <a href="avances.html" class="flex flex-col items-center gap-1 p-4 rounded-xl text-sm text-gray-600 dark:text-gray-300"><i class="fas fa-hand-holding-usd text-2xl text-amber-500"></i><span>Avances</span></a>
    <a href="fiche-paie.html" class="flex flex-col items-center gap-1 p-4 rounded-xl text-sm text-gray-600 dark:text-gray-300"><i class="fas fa-file-invoice text-2xl text-violet-500"></i><span>Fiche de paie</span></a>
    <button onclick="toggleDarkMode()" class="flex flex-col items-center gap-1 p-4 rounded-xl text-sm text-gray-600 dark:text-gray-300"><i class="fas fa-moon text-2xl text-slate-500 dark:hidden"></i><i class="fas fa-sun text-2xl text-yellow-400 hidden dark:inline"></i><span class="dark:hidden">Sombre</span><span class="hidden dark:inline">Clair</span></button>
  </div>
</div>
<!-- BOTTOM NAV -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 z-20 flex justify-around items-center h-16 px-1">
<a href="index.html" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400"><i class="fas fa-chart-pie text-xl"></i><span>Accueil</span></a>
<a href="ouvriers.html" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400"><i class="fas fa-users text-xl"></i><span>Ouvriers</span></a>
<a href="pointage.html" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400"><i class="fas fa-clipboard-check text-xl"></i><span>Pointage</span></a>
<a href="depenses.html" class="flex flex-col items-center gap-0.5 text-xs text-blue-600 dark:text-blue-400"><i class="fas fa-coins text-xl"></i><span>Dépenses</span></a>
<button onclick="toggleMore()" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 dark:text-gray-400" id="moreBtn"><i class="fas fa-ellipsis-h text-xl"></i><span>Plus</span></button>

</nav>
<script>
function toggleMore(){
  const d=document.getElementById('moreDrawer');
  d.classList.toggle('hidden');
  document.getElementById('moreBtn').querySelector('i').className = d.classList.contains('hidden') ? 'fas fa-ellipsis-h text-xl' : 'fas fa-times text-xl';
}
document.addEventListener('click',function(e){
  const d=document.getElementById('moreDrawer');
  const btn=document.getElementById('moreBtn');
  if(!d.classList.contains('hidden')&&!d.contains(e.target)&&!btn.contains(e.target)){
    d.classList.add('hidden');
    btn.querySelector('i').className='fas fa-ellipsis-h text-xl';
  }
});
</script>
<script>

document.getElementById('fDate').value=new Date().toISOString().split('T')[0];
const yearSel=document.getElementById('filterAnnee');const y=new Date().getFullYear();
for(let i=y-2;i<=y+1;i++){const o=document.createElement('option');o.value=i;o.textContent=i;if(i===y)o.selected=true;yearSel.appendChild(o);}
document.getElementById('filterMois').value=String(new Date().getMonth()+1).padStart(2,'0');
let depenses=[],chantiers=[];
const CAT_COLORS={'materiaux':'bg-blue-100 text-blue-700','transport':'bg-amber-100 text-amber-700','nourriture':'bg-emerald-100 text-emerald-700','location':'bg-violet-100 text-violet-700','divers':'bg-gray-100 text-gray-600'};
async function loadChantiers(){
  const r=await fetch('/api/chantiers');chantiers=await r.json();
  ['fChantier','filterChantier'].forEach(id=>{
    const sel=document.getElementById(id);const cur=sel.value;
    sel.innerHTML='<option value="">'+(id==='filterChantier'?'Tous les chantiers':'Chantier *')+'</option>'+chantiers.map(c=>`<option value="${c.id}">${c.nom}</option>`).join('');
    if(cur)sel.value=cur;
  });
}
async function loadDepenses(){
  let url='/api/depenses?';
  const c=document.getElementById('filterChantier').value,cat=document.getElementById('filterCategorie').value,m=document.getElementById('filterMois').value,a=document.getElementById('filterAnnee').value;
  if(c)url+=`chantier_id=${c}&`;if(m&&a)url+=`mois=${m}&annee=${a}&`;
  const r=await fetch(url);let all=await r.json();
  if(cat)all=all.filter(d=>d.categorie===cat);
  depenses=all;render();
}
function render(){
  let total=0;
  document.getElementById('depenseCards').innerHTML=depenses.map(d=>{total+=parseFloat(d.montant||0);return `
    <div class="flex items-start gap-3 bg-gray-50 dark:bg-slate-700/50 rounded-xl p-3">
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-1">
          <span class="text-xs font-medium px-2 py-0.5 rounded-full ${CAT_COLORS[d.categorie]||'bg-gray-100 text-gray-600'}">${d.categorie}</span>
          <span class="text-xs text-gray-400">${d.date}</span>
        </div>
        <div class="font-semibold text-gray-800 dark:text-gray-200">${parseFloat(d.montant||0).toFixed(2)} MAD</div>
        <div class="text-xs text-gray-500 dark:text-gray-400">${d.chantier_nom}${d.note?' · '+d.note:''}</div>
      </div>
      <button onclick="deleteDepense(${d.id})" class="text-red-400 hover:text-red-600 p-1 shrink-0"><i class="fas fa-trash text-sm"></i></button>
    </div>`;}).join('');
  document.getElementById('depensesTable').innerHTML=depenses.map(d=>`
    <tr class="border-b border-gray-100 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-700/30">
      <td class="p-4 text-gray-700 dark:text-gray-300">${d.date}</td>
      <td class="p-4 text-gray-700 dark:text-gray-300">${d.chantier_nom}</td>
      <td class="p-4"><span class="px-2 py-0.5 rounded text-xs bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-gray-300">${d.categorie}</span></td>
      <td class="p-4 font-medium text-gray-800 dark:text-gray-200">${parseFloat(d.montant||0).toFixed(2)} MAD</td>
      <td class="p-4 text-gray-600 dark:text-gray-400">${d.note||'-'}</td>
      <td class="p-4"><button onclick="deleteDepense(${d.id})" class="text-red-500 hover:text-red-700 dark:text-red-400"><i class="fas fa-trash"></i></button></td>
    </tr>`).join('');
  document.getElementById('totalMontant').textContent=total.toFixed(2);
  document.getElementById('depCount').textContent=depenses.length+' dépense(s)';
}
async function addDepense(){
  document.getElementById('formError').classList.add('hidden');
  const data={date:document.getElementById('fDate').value,chantier_id:parseInt(document.getElementById('fChantier').value),categorie:document.getElementById('fCategorie').value,montant:parseFloat(document.getElementById('fMontant').value),note:document.getElementById('fNote').value.trim()};
  if(!data.date||!data.chantier_id||!data.montant){const e=document.getElementById('formError');e.textContent='Veuillez remplir tous les champs obligatoires';e.classList.remove('hidden');return;}
  const r=await fetch('/api/depenses',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(!r.ok){const e2=await r.json();const e=document.getElementById('formError');e.textContent=e2.error||'Erreur';e.classList.remove('hidden');return;}
  document.getElementById('fMontant').value='';document.getElementById('fNote').value='';loadDepenses();
}
async function deleteDepense(id){if(!confirm('Supprimer ?'))return;await fetch(`/api/depenses/${id}`,{method:'DELETE'});loadDepenses();}
function exportExcel(){
  if(!depenses||depenses.length===0){alert('Aucune dépense à exporter.');return;}
  const rows=depenses.map(d=>({'Date':d.date,'Chantier':d.chantier_nom,'Catégorie':d.categorie,'Montant (MAD)':parseFloat(d.montant||0),'Note':d.note||''}));
  const total=depenses.reduce((s,d)=>s+parseFloat(d.montant||0),0);
  rows.push({'Date':'','Chantier':'','Catégorie':'TOTAL','Montant (MAD)':parseFloat(total.toFixed(2)),'Note':''});
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:25},{wch:14},{wch:16},{wch:30}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Dépenses');
  const mois=document.getElementById('filterMois').value,annee=document.getElementById('filterAnnee').value;
  const suffix=mois&&annee?`_${mois}-${annee}`:'';
  XLSX.writeFile(wb,`depenses${suffix}_AMSAN-BTP.xlsx`);
}
['filterChantier','filterCategorie','filterMois','filterAnnee'].forEach(id=>document.getElementById(id).addEventListener('change',loadDepenses));
loadChantiers();loadDepenses();

</script>
</body>
